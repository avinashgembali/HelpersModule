<div class="sidebar-container" [class.collapsed]="isCollapsed">
  <!-- Toggle button for mobile -->
  <button class="collapse-toggle" (click)="isCollapsed = !isCollapsed">
    <mat-icon>{{ isCollapsed ? 'menu' : 'close' }}</mat-icon>
  </button>

  <div class="sidebar-inner">
    <!-- HEADER -->
    <div class="header">
      <mat-icon class="home-icon">home</mat-icon>
      <div class="text-group">
        <span class="title">Manage</span>
        <span class="subtitle">by ASBL Homes</span>
      </div>
    </div>

    <!-- SEARCH -->
    <app-search></app-search>

    <!-- MENU -->
    <div class="sidebar-scrollable">

      <mat-nav-list *ngFor="let group of menuGroups">
        <!-- Hide entire group if no matches during search -->
        <ng-container *ngIf="isGroupVisible(group)">
          <mat-list-item (click)="toggleMenu(group.key)">
            <div class="menu-header">
              <mat-icon
                [class.rotated]="!openStates[group.key]"
                class="arrow-icon"
              >expand_more</mat-icon>
              <span class="menu-label">{{ group.title }}</span>
            </div>
          </mat-list-item>

          <div *ngIf="!openStates[group.key]" class="submenu">
            <ng-container *ngFor="let item of getFilteredItems(group)">
              <mat-list-item
                [routerLink]="item.route !== '#' ? [item.route] : null"
                routerLinkActive="active-link"
                [routerLinkActiveOptions]="{ exact: false }"
                (click)="navigate(item)"
              >
                <div class="submenu-item">
                  <mat-icon class="submenu-icon">{{ item.icon }}</mat-icon>
                  <span [innerHTML]="highlight(item.label)"></span>
                </div>
              </mat-list-item>
            </ng-container>
          </div>
        </ng-container>
      </mat-nav-list>

      <!-- No results -->
      <div *ngIf="hasNoResults" class="no-results">
        <mat-icon>search_off</mat-icon>
        <p>No results for "{{ searchQuery }}"</p>
      </div>

    </div>

    <!-- USER -->
    <div class="sidebar-user">
      <div class="left">
        <div class="logo">US</div>
      </div>
      <div class="right">
        <h2>User</h2>
        <p>ASBL Springs</p>
      </div>
      <div class="arrow">&gt;</div>
    </div>
  </div>
</div>
