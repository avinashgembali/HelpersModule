<div class="search-box">
  <mat-icon class="search-icon">search</mat-icon>
  <input
    type="text"
    placeholder="Search menu..."
    [(ngModel)]="query"
    (input)="onSearch()"
  />
  <button *ngIf="query" class="clear-btn" (click)="clearSearch()">
    <mat-icon>close</mat-icon>
  </button>
</div>
